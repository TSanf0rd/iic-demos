<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hussmann Refresh — Live Order Tracking</title>

  <!--
    ========================================================================
    DEMO 3: LIVE ORDER TRACKING
    ------------------------------------------------------------------------
    STRUCTURE OF THIS FILE:
      1. <head>  — metadata + all the CSS (the styling)
      2. <body>  — the HTML structure (mostly empty containers that
                   JavaScript fills in)
      3. <script>— loads data.js first, then app.js (the logic)

    HOW A WEB PAGE WORKS (the 3 languages):
      - HTML  = the STRUCTURE (like the skeleton / the nouns)
      - CSS   = the STYLING   (like the clothing / the adjectives)
      - JS    = the BEHAVIOR  (like the muscles / the verbs)

    We're using plain HTML/CSS/JS with NO frameworks and NO build step.
    That's deliberate: GitHub Pages serves these files as-is, and the
    browser runs them directly. Nothing to compile, nothing to break
    during a live demo.
    ========================================================================
  -->

  <style>
    /* ======================================================================
       DESIGN TOKENS
       ----------------------------------------------------------------------
       CSS "custom properties" (variables) defined once at the top, then
       reused everywhere. Same "single source of truth" idea as the data
       file: change a color here, and it updates across the whole app.

       The `:root` selector means "the whole document" — variables defined
       here are available to every element on the page.
       ====================================================================== */
    :root {
      /* Hussmann brand blues */
      --navy:        #0B2D4D;   /* deep corporate navy — headers, primary */
      --navy-2:      #143D63;   /* slightly lighter navy for accents */
      --blue:        #1E6BB8;   /* active/interactive blue */
      --blue-soft:   #E5EFFB;   /* soft blue background wash */

      /* Warm neutrals — softer than pure white, feels less templated */
      --bg:          #F5F3EE;   /* page background — warm off-white */
      --surface:     #FFFFFF;   /* cards sit on white above the warm bg */
      --surface-2:   #FAF9F6;   /* subtle alternate surface */
      --border:      #E2DFD8;   /* hairline borders — warm gray */
      --border-2:    #CFCBC1;   /* stronger border on hover */

      /* Text */
      --ink:         #1A1A18;   /* near-black primary text */
      --ink-2:       #5A574F;   /* muted secondary text */
      --ink-3:       #8A867B;   /* faint tertiary text / captions */

      /* Status colors — used ONLY for state, so they stay meaningful */
      --green:       #2E9E4A;   --green-bg: #E7F4EA;   --green-ink: #1E7A34;
      --amber:       #E08A16;   --amber-bg: #FDF0E3;   --amber-ink: #B4600A;
      --sky:         #2A7FD4;   --sky-bg:   #E5EFFB;   --sky-ink:   #1560A8;
      --gray:        #9A9A94;   --gray-bg:  #EEEEEC;   --gray-ink:  #5F5F5B;
      --red:         #C62828;   --red-bg:   #FBE4E4;   --red-ink:   #B02020;

      /* Layout */
      --radius:      10px;      /* standard corner rounding */
      --radius-lg:   14px;      /* larger cards */
      --gap:         16px;
      --maxw:        1180px;    /* max content width */

      /* Type */
      --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --mono: "SF Mono", "Roboto Mono", ui-monospace, monospace;
    }

    /* ======================================================================
       RESET & BASE
       ----------------------------------------------------------------------
       Browsers apply their own default margins/padding. The `* { }` universal
       selector zeroes them out so we start from a clean, predictable slate.
       `box-sizing: border-box` makes width/height include padding+border,
       which makes layout math far more intuitive.
       ====================================================================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* Load Inter from Google Fonts — a clean, professional workhorse face
       used widely in enterprise SaaS. Loaded via @import for simplicity. */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    /* ======================================================================
       TOP BAR (Hussmann-branded header)
       ----------------------------------------------------------------------
       The dark navy bar establishes "this is an internal enterprise tool"
       the moment the page loads — not a consumer app.
       ====================================================================== */
    .topbar {
      background: var(--navy);
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 3px solid var(--blue);
    }
    .topbar .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .topbar .brand-mark {
      width: 34px; height: 34px;
      border-radius: 7px;
      background: linear-gradient(135deg, var(--blue) 0%, var(--navy-2) 100%);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 17px; letter-spacing: -0.5px;
    }
    .topbar .brand-text { display: flex; flex-direction: column; line-height: 1.15; }
    .topbar .brand-text .name { font-weight: 600; font-size: 15px; letter-spacing: 0.2px; }
    .topbar .brand-text .sub  { font-size: 11.5px; color: #A9C4DE; font-weight: 400; }
    .topbar .env {
      font-size: 11px; font-weight: 500;
      color: #A9C4DE;
      border: 1px solid #2A4E70;
      padding: 4px 10px; border-radius: 999px;
    }

    /* ======================================================================
       PAGE LAYOUT
       ====================================================================== */
    .page {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 28px 24px 60px;
    }

    /* Section heading used above the dashboard and detail views */
    .section-head { margin-bottom: 20px; }
    .section-head .eyebrow {
      font-size: 11.5px; font-weight: 600; letter-spacing: 1px;
      text-transform: uppercase; color: var(--blue);
      margin-bottom: 4px;
    }
    .section-head h1 {
      font-size: 23px; font-weight: 600; letter-spacing: -0.3px;
      color: var(--navy);
    }
    .section-head p { color: var(--ink-2); font-size: 14px; margin-top: 3px; }

    /* ======================================================================
       DASHBOARD — the grid of order cards
       ----------------------------------------------------------------------
       CSS Grid lays the cards out in responsive columns. `auto-fill` +
       `minmax` means: fit as many 340px-min cards per row as will fit, and
       stretch them to fill. Resize the window and the count adjusts itself.
       ====================================================================== */
    .order-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: var(--gap);
    }

    .order-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px;
      cursor: pointer;
      transition: border-color 0.15s ease, transform 0.12s ease, box-shadow 0.15s ease;
    }
    .order-card:hover {
      border-color: var(--blue);
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(11, 45, 77, 0.08);
    }
    .order-card .card-top {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 12px;
    }
    .order-card .cust { font-size: 16.5px; font-weight: 600; color: var(--ink); }
    .order-card .store { font-size: 12.5px; color: var(--ink-2); margin-top: 1px; }
    .order-card .oid {
      font-family: var(--mono); font-size: 11.5px; color: var(--ink-3);
      margin-top: 8px; letter-spacing: 0.2px;
    }
    .order-card .cases {
      font-size: 13px; color: var(--ink-2);
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .order-card .card-bottom {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 14px;
    }
    .order-card .stage-label { font-size: 12.5px; color: var(--ink-2); }
    .order-card .stage-label strong { color: var(--navy); font-weight: 600; }

    /* ======================================================================
       STATUS BADGE — the colored pill (On Track / At Risk / etc.)
       ----------------------------------------------------------------------
       Base `.badge` sets shape/size. The color comes from inline styles the
       JavaScript injects (from STATUS_CONFIG in data.js), which keeps the
       color logic in one place. The small dot uses `currentColor` tricks.
       ====================================================================== */
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600;
      padding: 4px 11px; border-radius: 999px;
      white-space: nowrap;
    }
    .badge .dot { width: 7px; height: 7px; border-radius: 50%; }

    /* ======================================================================
       DETAIL VIEW
       ====================================================================== */
    .detail { display: none; }          /* hidden until an order is clicked */
    .detail.active { display: block; }
    .dashboard.hidden { display: none; }

    .back-btn {
      display: inline-flex; align-items: center; gap: 7px;
      background: none; border: none; cursor: pointer;
      font-family: var(--font); font-size: 13.5px; font-weight: 500;
      color: var(--blue); padding: 6px 0; margin-bottom: 16px;
    }
    .back-btn:hover { color: var(--navy); }
    .back-btn .arrow { font-size: 16px; line-height: 1; }

    /* Detail header card — the order summary at the top of the detail view */
    .detail-header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 22px 24px;
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 20px;
    }
    .detail-header .dh-cust { font-size: 22px; font-weight: 600; color: var(--navy); }
    .detail-header .dh-store { font-size: 14px; color: var(--ink-2); margin-top: 2px; }
    .detail-header .dh-meta { display: flex; gap: 28px; margin-top: 16px; }
    .detail-header .dh-meta .item .k {
      font-size: 11px; font-weight: 600; letter-spacing: 0.6px;
      text-transform: uppercase; color: var(--ink-3); margin-bottom: 3px;
    }
    .detail-header .dh-meta .item .v {
      font-size: 14.5px; font-weight: 500; color: var(--ink);
    }
    .detail-header .dh-meta .item .v.mono { font-family: var(--mono); font-size: 13px; }

    /* ======================================================================
       TABS (Customer View / Internal View)
       ----------------------------------------------------------------------
       The signature interaction. Tabs sit on a track; the active one gets a
       navy underline. Clicking swaps which panel is visible (JS handles it).
       ====================================================================== */
    .tabs {
      display: flex; gap: 4px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 24px;
    }
    .tab {
      background: none; border: none; cursor: pointer;
      font-family: var(--font); font-size: 14px; font-weight: 500;
      color: var(--ink-2);
      padding: 11px 18px;
      position: relative;
      transition: color 0.15s ease;
    }
    .tab:hover { color: var(--navy); }
    .tab.active { color: var(--navy); font-weight: 600; }
    /* The underline sits just below the tab, overlapping the 2px track */
    .tab.active::after {
      content: "";
      position: absolute; left: 0; right: 0; bottom: -2px;
      height: 2px; background: var(--navy);
    }
    .tab .tab-hint {
      display: block; font-size: 11px; font-weight: 400;
      color: var(--ink-3); margin-top: 1px;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ======================================================================
       Placeholder styles for content we build in the next pieces
       (progress rail + parts table). Defined now so the shell is complete.
       ====================================================================== */
    .panel-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 26px 24px;
    }

    /* ======================================================================
       CUSTOMER VIEW — header row above the rail
       ====================================================================== */
    .cust-head {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 34px;
    }
    .cust-head-title { font-size: 17px; font-weight: 600; color: var(--navy); }
    .cust-head-sub { font-size: 13.5px; color: var(--ink-2); margin-top: 2px; }
    .cust-head-sub strong { color: var(--ink); font-weight: 600; }

    /* ======================================================================
       THE PROGRESS RAIL — the signature FedEx-style stage tracker
       ----------------------------------------------------------------------
       Structure (three layers stacked with position):
         .rail          = the positioning context (position: relative)
           .rail-track  = the full-width gray line (the "unfilled" path)
           .rail-fill   = the navy line on top, width set by JS = % complete
           .rail-nodes  = the row of stage circles, spaced evenly
       The track and fill are absolutely positioned so they sit BEHIND the
       nodes at the vertical center of the circles.
       ====================================================================== */
    .rail {
      position: relative;
      padding: 0 4px;
    }
    /* The gray baseline and the navy fill both sit at the vertical center of
       the 34px circles (17px down), behind the nodes (z-index below). */
    .rail-track, .rail-fill {
      position: absolute;
      top: 17px;
      height: 3px;
      border-radius: 3px;
    }
    .rail-track {
      left: 4px; right: 4px;
      background: var(--border);
    }
    .rail-fill {
      left: 4px;
      background: var(--navy);
      transition: width 0.5s ease;   /* animates if we ever update progress */
      max-width: calc(100% - 8px);
    }
    /* The nodes row uses flex with space-between so the 8 circles spread out
       evenly across the full width. z-index lifts them above the lines. */
    .rail-nodes {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
    }
    .rail-node {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 84px;              /* fixed width keeps labels from shifting */
      text-align: center;
    }
    .rail-dot {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600;
      background: var(--surface);
      border: 2px solid var(--border-2);
      color: var(--ink-3);
      margin-bottom: 10px;
      transition: all 0.2s ease;
    }
    .rail-label {
      font-size: 11.5px; line-height: 1.3;
      color: var(--ink-3);
      font-weight: 500;
    }
    /* DONE stages: filled navy circle with a checkmark, darker label */
    .rail-node.done .rail-dot {
      background: var(--navy);
      border-color: var(--navy);
      color: #fff;
    }
    .rail-node.done .rail-label { color: var(--ink-2); }
    /* ACTIVE stage: bright blue ring, blue label, subtle emphasis */
    .rail-node.active .rail-dot {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
      box-shadow: 0 0 0 4px var(--blue-soft);
    }
    .rail-node.active .rail-label {
      color: var(--navy);
      font-weight: 600;
    }
    /* UPCOMING stages stay in the faint default styling defined above. */

    /* Carrier tracking block (only shows for shipped orders) */
    .carrier {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 3px;
    }
    .carrier-k {
      font-size: 11px; font-weight: 600; letter-spacing: 0.6px;
      text-transform: uppercase; color: var(--ink-3);
    }
    .carrier-v {
      font-family: var(--mono); font-size: 14px; color: var(--navy);
      font-weight: 500;
    }

    /* ======================================================================
       INTERNAL VIEW — risk banner + parts table
       ====================================================================== */

    /* The alert banner at the top of the internal view. Its color and icon
       change with severity (jeopardy = red, delayed = amber, clear = green). */
    .risk-banner {
      display: flex; gap: 14px; align-items: flex-start;
      border-radius: var(--radius);
      padding: 15px 17px;
      margin-bottom: 20px;
      border: 1px solid transparent;
    }
    .risk-banner-icon {
      flex-shrink: 0;
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px;
      color: #fff;
    }
    .risk-banner-title { font-size: 14.5px; font-weight: 600; margin-bottom: 2px; }
    .risk-banner-text  { font-size: 13px; line-height: 1.5; }
    .risk-banner-text strong { font-weight: 600; }

    .risk-banner.jeopardy {
      background: var(--red-bg); border-color: #F0C4C4;
    }
    .risk-banner.jeopardy .risk-banner-icon { background: var(--red); }
    .risk-banner.jeopardy .risk-banner-title { color: var(--red-ink); }
    .risk-banner.jeopardy .risk-banner-text { color: #7A2020; }

    .risk-banner.delayed {
      background: var(--amber-bg); border-color: #F3D9B4;
    }
    .risk-banner.delayed .risk-banner-icon { background: var(--amber); }
    .risk-banner.delayed .risk-banner-title { color: var(--amber-ink); }
    .risk-banner.delayed .risk-banner-text { color: #7A4E0A; }

    .risk-banner.clear {
      background: var(--green-bg); border-color: #C4E4CC;
    }
    .risk-banner.clear .risk-banner-icon { background: var(--green); }
    .risk-banner.clear .risk-banner-title { color: var(--green-ink); }
    .risk-banner.clear .risk-banner-text { color: #2A5E38; }

    /* Caption above the table */
    .internal-sub {
      font-size: 12.5px; color: var(--ink-3);
      margin-bottom: 16px; line-height: 1.5;
    }

    /* The parts table. `table-wrap` allows horizontal scroll on small screens
       instead of squishing the columns. */
    .table-wrap { overflow-x: auto; }
    .parts-table {
      width: 100%;
      border-collapse: collapse;   /* merge cell borders into single lines */
      font-size: 13px;
    }
    .parts-table th {
      text-align: left;
      font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
      text-transform: uppercase; color: var(--ink-3);
      padding: 0 14px 10px;
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
    }
    .parts-table td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--ink);
      vertical-align: middle;
    }
    .parts-table .mono { font-family: var(--mono); font-size: 12px; color: var(--navy); }
    .parts-table .num { text-align: center; }
    .parts-table th.num { text-align: center; }
    .parts-table .note { color: var(--ink-2); font-size: 12.5px; }

    /* Risk cells */
    .risk-none { color: var(--ink-3); }
    .risk-pill {
      display: inline-block;
      font-size: 11.5px; font-weight: 600;
      padding: 3px 10px; border-radius: 999px;
      white-space: nowrap;
    }

    /* Faint row tint for at-risk parts, so the eye jumps to them */
    .parts-table tr.row-delayed  td { background: rgba(224, 138, 22, 0.05); }
    .parts-table tr.row-jeopardy td { background: rgba(198, 40, 40, 0.05); }

    /* ======================================================================
       SUPPLY-CHAIN MAP (inside the internal view)
       ====================================================================== */
    .map-section { margin-bottom: 22px; }
    .map-section-head { margin-bottom: 10px; }
    .map-holder {
      position: relative;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px;
    }
    .supply-map { display: block; width: 100%; height: auto; }

    /* Landmasses */
    .mstate { fill: #E9E5DC; stroke: #fff; stroke-width: 0.6; }
    .mstate.context { fill: #EFEDE7; stroke: #fff; stroke-width: 0.5; }

    /* Routes (legs) */
    .mleg { fill: none; stroke-linecap: round; opacity: 1; transition: opacity 0.15s; }
    .mleg.complete { stroke: var(--navy); stroke-width: 2.2; }
    .mleg.moving   { stroke: var(--blue); stroke-width: 2.4; stroke-dasharray: 6 5; animation: mdash 0.9s linear infinite; }
    .mleg.stuck    { stroke: var(--red);  stroke-width: 2.6; stroke-dasharray: 3 4; }
    .mleg.waiting  { stroke: #B9B4A8; stroke-width: 2; stroke-dasharray: 2 6; }
    @keyframes mdash { to { stroke-dashoffset: -22; } }

    /* Nodes */
    .mnode { cursor: pointer; }
    .mhalo { fill: var(--navy); opacity: 0; transition: opacity 0.15s; }
    .mdot { stroke: #fff; stroke-width: 2; }
    .mdot.plant { fill: var(--navy); }
    .mdot.hub { fill: #C99A2E; }
    .mdiamond { fill: var(--amber); stroke: #fff; stroke-width: 1.5; }
    .mlabel, .mstore-label {
      text-anchor: middle; paint-order: stroke; stroke: #fff; stroke-width: 3px;
    }
    .mlabel { font-size: 10px; font-weight: 600; fill: var(--navy); }
    .mstore-label { font-size: 9px; font-weight: 500; fill: var(--ink-2); stroke: var(--surface-2); stroke-width: 2.5px; }

    /* Context (uninvolved) facilities are faint */
    .mnode.context .mdot { opacity: 0.28; }
    .mnode.context .mlabel { opacity: 0.35; }
    .mnode.on .mhalo { opacity: 0.16; }

    /* When a facility is isolated (focused), dim non-active legs & nodes */
    .supply-map.focused .mleg:not(.on) { opacity: 0.1; }
    .supply-map.focused .mnode.involved:not(.on) .mdot { opacity: 0.25; }
    .supply-map.focused .mnode.involved:not(.on) .mlabel { opacity: 0.25; }

    /* Map tooltip */
    .map-tip {
      position: absolute; pointer-events: none; z-index: 5;
      background: var(--navy); color: #fff; font-size: 12px;
      padding: 7px 10px; border-radius: 7px; opacity: 0; transition: opacity 0.12s;
      max-width: 220px; line-height: 1.4;
    }
    .map-tip .tname { font-weight: 600; margin-bottom: 1px; }
    .map-tip .tmakes { font-size: 11px; color: #B9CFE4; }

    /* ======================================================================
       COPILOT ASSISTANT PANEL
       ====================================================================== */
    .copilot {
      margin-top: 24px;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, #F7FAFD 0%, var(--surface) 100%);
      padding: 20px;
    }
    .copilot-head {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px;
    }
    .copilot-badge {
      font-size: 11px; font-weight: 700; letter-spacing: 0.4px;
      color: #fff; background: linear-gradient(135deg, #2A7FD4 0%, #7B4FD0 100%);
      padding: 3px 9px; border-radius: 5px;
    }
    .copilot-title { font-size: 15px; font-weight: 600; color: var(--navy); }
    .copilot-note { font-size: 11.5px; color: var(--ink-3); margin-left: auto; }

    /* The incoming email */
    .email-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px; margin-bottom: 14px;
    }
    .email-meta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
    .email-from { font-size: 13.5px; font-weight: 600; color: var(--ink); }
    .email-addr { font-size: 12px; color: var(--ink-3); font-family: var(--mono); }
    .email-subj { font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 6px; }
    .email-body { font-size: 13px; color: var(--ink-2); line-height: 1.55; }

    .copilot-actions { margin-bottom: 4px; }
    .cbtn {
      font-family: var(--font); font-size: 13px; font-weight: 600;
      border-radius: 8px; padding: 9px 16px; cursor: pointer;
      border: 1px solid var(--border-2); background: var(--surface); color: var(--navy);
      transition: all 0.14s ease;
    }
    .cbtn:hover { border-color: var(--blue); }
    .cbtn:disabled { opacity: 0.7; cursor: default; }
    .cbtn.primary { background: var(--navy); color: #fff; border-color: var(--navy); }
    .cbtn.primary:hover { background: var(--navy-2); }

    /* Copilot's response */
    .copilot-response { margin-top: 14px; }
    .copilot-response-inner {
      font-size: 13.5px; line-height: 1.6; color: var(--ink);
      background: var(--surface); border: 1px solid var(--border);
      border-left: 3px solid var(--blue);
      border-radius: var(--radius); padding: 14px 16px;
      white-space: pre-wrap;               /* preserve the \n\n paragraph breaks */
      min-height: 20px;
    }
    .copilot-draft-actions { margin-top: 12px; }

    /* Contact recommendation card */
    .copilot-contact { margin-top: 14px; }
    .contact-flag {
      font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
      color: #7B4FD0; margin-bottom: 6px;
    }
    .contact-card {
      display: flex; align-items: center; gap: 14px;
      background: var(--surface); border: 1px solid #E0D6F0;
      border-left: 3px solid #7B4FD0; border-radius: var(--radius);
      padding: 13px 16px;
    }
    .contact-main { flex: 1; }
    .contact-name { font-size: 14.5px; font-weight: 600; color: var(--navy); }
    .contact-role { font-size: 12.5px; color: var(--ink-2); margin-top: 1px; }
    .contact-reason { font-size: 12.5px; color: var(--ink-2); line-height: 1.5; margin-top: 6px; }
    .intro-card {
      margin-top: 10px; background: var(--surface-2);
      border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px;
    }

    /* The drafted reply */
    .draft-card {
      margin-top: 12px; background: var(--surface-2);
      border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px;
    }
    .draft-label {
      font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
      color: var(--ink-3); margin-bottom: 8px;
    }
    .draft-body {
      font-size: 13.5px; line-height: 1.6; color: var(--ink);
      white-space: pre-wrap; font-family: var(--font);
    }
    .draft-hint { font-size: 11.5px; color: var(--ink-3); margin-top: 10px; font-style: italic; }

    /* ======================================================================
       RESPONSIVE — collapse to single column on narrow screens
       ====================================================================== */
    @media (max-width: 640px) {
      .order-grid { grid-template-columns: 1fr; }
      .detail-header { flex-direction: column; gap: 14px; }
      .detail-header .dh-meta { flex-wrap: wrap; gap: 16px; }
    }
    /* ======================================================================
       ADDED FEATURES — portfolio strip, triage, SLA, grouping, toast,
       impact panel, bottleneck, install block
       ====================================================================== */
    .pf-strip { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
    .pf { flex:1; min-width:130px; background:var(--surface); border:1px solid var(--border);
          border-radius:var(--radius); padding:12px 14px; }
    .pf-n { font-size:20px; font-weight:700; color:var(--navy); letter-spacing:-0.3px; }
    .pf-n.pf-risk { color:var(--red-ink); }
    .pf-n.pf-warn { color:var(--amber-ink); }
    .pf-l { font-size:11.5px; color:var(--ink-3); margin-top:2px; }

    .triage { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; margin-bottom:16px; }
    .tri-field { display:flex; flex-direction:column; gap:5px; font-size:11px; font-weight:600;
                 letter-spacing:.4px; text-transform:uppercase; color:var(--ink-3); }
    .tri-field select { font-family:var(--font); font-size:13px; padding:8px 11px; border-radius:8px;
                        border:1px solid var(--border-2); background:var(--surface); color:var(--ink); cursor:pointer; }
    .tri-group { font-family:var(--font); font-size:13px; font-weight:600; padding:9px 15px; border-radius:8px;
                 border:1px solid var(--border-2); background:var(--surface); color:var(--navy); cursor:pointer; }
    .tri-group.on { background:var(--navy); color:#fff; border-color:var(--navy); }

    .nat-tag { font-size:9.5px; font-weight:700; letter-spacing:.4px; text-transform:uppercase;
               color:var(--sky-ink); background:var(--sky-bg); padding:2px 6px; border-radius:4px; vertical-align:middle; }

    .card-meta { display:flex; align-items:center; justify-content:space-between; margin:10px 0 4px; }
    .card-value { font-size:15px; font-weight:700; color:var(--navy); }
    .sla-chip { font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px; white-space:nowrap; }
    .sla-met    { background:var(--gray-bg);  color:var(--gray-ink); }
    .sla-ok     { background:var(--green-bg); color:var(--green-ink); }
    .sla-tight  { background:var(--amber-bg); color:var(--amber-ink); }
    .sla-breach { background:var(--red-bg);   color:var(--red-ink); }

    .acct-group { margin-bottom:22px; }
    .acct-head { display:flex; align-items:baseline; justify-content:space-between; gap:12px;
                 padding:0 2px 8px; border-bottom:2px solid var(--border); margin-bottom:14px; }
    .acct-name { font-size:16px; font-weight:700; color:var(--navy); }
    .acct-meta { font-size:12.5px; color:var(--ink-2); }
    .acct-risk { color:var(--red-ink); font-weight:600; }

    #toastWrap { position:fixed; right:20px; bottom:20px; display:flex; flex-direction:column;
                 gap:10px; z-index:9999; }
    .toast { background:var(--navy); color:#fff; border-left:3px solid var(--sky); border-radius:10px;
             padding:12px 16px; min-width:250px; max-width:340px; box-shadow:0 6px 20px rgba(11,45,77,.22);
             animation:toastIn .3s ease; }
    .toast.resolve { border-left-color:var(--green); }
    .toast-t { font-size:11px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:#A9C4DE; }
    .toast-m { font-size:13.5px; margin-top:2px; }
    @keyframes toastIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }

    .impact { margin-top:18px; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
    .impact-head { display:flex; align-items:center; justify-content:space-between; gap:10px;
                   background:var(--blue-soft); padding:11px 16px; }
    .impact-title { font-size:13.5px; font-weight:700; color:var(--navy); }
    .impact-tag { font-size:10.5px; font-weight:600; text-transform:uppercase; letter-spacing:.4px;
                  color:var(--amber-ink); background:var(--amber-bg); padding:3px 8px; border-radius:5px; }
    .impact-grid { display:flex; gap:8px; padding:16px; flex-wrap:wrap; }
    .impact-grid > div { flex:1; min-width:100px; }
    .impact-n { font-size:22px; font-weight:700; color:var(--navy); letter-spacing:-0.4px; }
    .impact-l { font-size:11.5px; color:var(--ink-3); margin-top:2px; }
    .impact-note { font-size:11px; color:var(--ink-3); padding:0 16px 14px; line-height:1.5; }

    /* installation guides (customer view) */
    .cust-manuals { margin-top:18px; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
    .cm-head { padding:12px 16px; border-bottom:1px solid var(--border); background:var(--surface-2); }
    .cm-title { font-size:13.5px; font-weight:700; color:var(--navy); }
    .cm-sub { font-size:11.5px; color:var(--ink-3); margin-top:2px; }
    .cm-list { padding:12px 16px 14px; display:grid; gap:8px; }
    .cm-item { display:flex; align-items:center; gap:10px; text-decoration:none;
               padding:9px 11px; border:1px solid var(--border); border-radius:8px;
               background:var(--surface); transition:border-color .12s; }
    .cm-item:hover { border-color:var(--blue); }
    .cm-ic { font-size:14px; }
    .cm-name { flex:1; font-size:12.5px; color:var(--navy); font-weight:500; }
    .cm-meta { font-size:10.5px; font-weight:700; color:var(--blue); }
    /* where status signals originate (Emily's realism note) */
    .cust-provenance { margin-top:12px; font-size:11px; color:var(--ink-3); line-height:1.5; }

    .bottleneck { display:flex; align-items:center; gap:12px; background:var(--amber-bg);
                  border:1px solid #F0D2A6; border-radius:var(--radius); padding:12px 15px; margin-bottom:14px; }
    .bn-icon { font-size:18px; color:var(--amber-ink); flex-shrink:0; }
    .bn-body { flex:1; }
    .bn-title { font-size:13.5px; font-weight:700; color:var(--amber-ink); }
    .bn-note { font-size:12.5px; color:var(--ink-2); margin-top:1px; }
    .bn-tag { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.4px;
              color:var(--amber-ink); border:1px solid #E7B87A; border-radius:5px; padding:3px 7px; flex-shrink:0; }

    .install-block { border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; margin-bottom:16px; }
    .ib-head { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.5px;
               color:var(--ink-3); margin-bottom:10px; }
    .ib-grid { display:flex; gap:20px; flex-wrap:wrap; }
    .ib-l { font-size:11.5px; color:var(--ink-3); }
    .ib-v { font-size:14px; font-weight:600; color:var(--ink); margin-top:1px; }

  </style>
</head>

<body>

  <!-- ======================================================================
       TOP BAR — always visible, establishes the Hussmann brand
       ====================================================================== -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">H</div>
      <div class="brand-text">
        <span class="name">Hussmann Refresh</span>
        <span class="sub">Live Order Tracking</span>
      </div>
    </div>
    <span class="env">Internal Tool · Demo</span>
  </header>

  <!-- ======================================================================
       MAIN PAGE — holds BOTH the dashboard and the detail view.
       JavaScript shows one and hides the other. They live in the same page
       so switching between them is instant (no page reload).
       ====================================================================== -->
  <main class="page">

    <!-- ---- DASHBOARD VIEW (the grid of orders) ---- -->
    <section class="dashboard" id="dashboard">
      <div class="section-head">
        <div class="eyebrow">Active Refresh Projects</div>
        <h1>Order Dashboard</h1>
        <p>Your refresh portfolio across every store. Triage by risk, value, or ship date; group by account.</p>
      </div>

      <!-- Portfolio summary — the numbers a rep triages on -->
      <div class="pf-strip" id="pfSummary"></div>

      <!-- Triage controls -->
      <div class="triage">
        <label class="tri-field">Sort
          <select id="triageSort">
            <option value="risk">Risk first</option>
            <option value="ship">Ship date (soonest)</option>
            <option value="value">Value (highest)</option>
          </select>
        </label>
        <label class="tri-field">Show
          <select id="triageFilter">
            <option value="all">All orders</option>
            <option value="at_risk">At risk only</option>
            <option value="open">Open (not closed)</option>
            <option value="national">National accounts</option>
          </select>
        </label>
        <button class="tri-group" id="triageGroup">Group by account</button>
      </div>

      <!-- The grid starts EMPTY. JavaScript fills it based on the triage state. -->
      <div id="orderGrid"></div>
    </section>

    <!-- ---- DETAIL VIEW (hidden until an order is clicked) ---- -->
    <section class="detail" id="detail">
      <button class="back-btn" id="backBtn">
        <span class="arrow">&larr;</span> Back to dashboard
      </button>

      <!-- The detail header (customer, store, meta) — filled by JS -->
      <div class="detail-header" id="detailHeader"></div>

      <!-- The two tabs -->
      <div class="tabs">
        <button class="tab active" data-tab="customer">
          Customer View
          <span class="tab-hint">What the customer sees</span>
        </button>
        <button class="tab" data-tab="internal">
          Internal View
          <span class="tab-hint">Part-level detail &amp; risks</span>
        </button>
      </div>

      <!-- The two panels — one shows at a time. Filled by JS in later pieces. -->
      <div class="tab-panel active" id="panel-customer">
        <div class="panel-card">Customer tracking view — built in the next step.</div>
      </div>
      <div class="tab-panel" id="panel-internal">
        <div class="panel-card">Internal parts view — built in the step after.</div>
      </div>
    </section>

  </main>

  <!-- Live push notifications land here (webhook-style updates) -->
  <div id="toastWrap"></div>

       data.js MUST load first (it defines ORDERS, STAGES, etc.),
       then app.js uses that data. The browser runs them top-to-bottom.

  <script>
// ============================================================================
//  DEMO 3: LIVE ORDER TRACKING — DATA LAYER
//  ---------------------------------------------------------------------------
//  This file holds ALL the fake order data for the demo.
//
//  WHY THIS FILE EXISTS SEPARATELY:
//  In a real application, this data would come from Oracle (via an API call).
//  For the demo, we hardcode it. Keeping it in its own file means that when
//  Anthony gives us feedback on real serial numbers, part numbers, or order
//  formats, we ONLY edit this file — the display and interaction code never
//  changes. This is called "separation of concerns" — data lives in one place,
//  the logic that displays it lives somewhere else.
//
//  PYTHON COMPARISON:
//  If you were writing this in Python, this would be a list of dictionaries:
//      ORDERS = [ {"id": "...", "customer": "..."}, {...} ]
//  In JavaScript, the same structure is an ARRAY of OBJECTS.
//    - Array  = ordered list, written with [ ]      (like a Python list)
//    - Object = key/value pairs, written with { }   (like a Python dict)
//  The syntax difference: JS uses  key: value  (no quotes needed on keys),
//  Python uses  "key": value  (quotes required on keys).
// ============================================================================


// ----------------------------------------------------------------------------
//  THE STAGE DEFINITIONS
//  ---------------------------------------------------------------------------
//  Every order moves through these 8 stages. We define them ONCE here as a
//  single source of truth, then each order just stores WHICH stage number it's
//  currently on. This avoids repeating the stage names inside every order.
//
//  Think of it like a train line: the stations (stages) are fixed, and each
//  train (order) just reports which station it's currently at.
// ----------------------------------------------------------------------------
const STAGES = [
  { num: 1, name: "Order Confirmed",  desc: "PO received, booked in Oracle" },
  { num: 2, name: "Parts Sourcing",   desc: "Verifying stock, issuing POs" },
  { num: 3, name: "In Production",     desc: "Plant manufacturing parts" },
  { num: 4, name: "Quality Check",     desc: "Parts inspected and matched" },
  { num: 5, name: "Packing",           desc: "Warehouse assembling shipment" },
  { num: 6, name: "Shipped",           desc: "In transit to store" },
  { num: 7, name: "Delivered",         desc: "Received at store location" },
  { num: 8, name: "Install Scheduled", desc: "Crew and date confirmed" },
  { num: 9, name: "Installation",      desc: "Crew on site, fitting parts" },
  { num: 10, name: "Project Closed",   desc: "Signed off, warranty registered" },
];


// ----------------------------------------------------------------------------
//  THE ORDERS
//  ---------------------------------------------------------------------------
//  Each order object has two "faces":
//    1. Fields the CUSTOMER sees (id, customer, currentStage, shipDate, etc.)
//    2. A `parts` array the INTERNAL team sees (part-level status + risks)
//
//  The `status` field drives the colored badge. We use a small set of allowed
//  values so the styling stays consistent:
//    "on_track"  -> green   "at_risk" -> amber
//    "in_transit"-> blue    "closed"  -> gray
//
//  The `riskLevel` on each part also uses a fixed set:
//    "none" -> no problem   "delayed" -> late but recoverable
//    "jeopardy" -> will miss the ship date (the critical one)
// ----------------------------------------------------------------------------
const ORDERS = [

// SLA: days from today to the ship date, plus a flag.
//   met = already shipped/closed · breach = past due & not shipped
//   tight = <=3 days left · ok = comfortable
function slaFor(order) {
  const ship = new Date(order.shipISO + "T00:00:00");
  const days = Math.round((ship - DEMO_TODAY) / 86400000);
  const shipped = order.currentStage >= 6;   // stage 6 = Shipped
  let flag;
  if (order.status === "closed" || shipped) flag = "met";
  else if (days < 0) flag = "breach";
  else if (days <= 3) flag = "tight";
  else flag = "ok";
  return { days: days, shipped: shipped, flag: flag };
}

// ----------------------------------------------------------------------------
//  PART ORIGIN MAPPING  (which facility manufactures each part)
//  ---------------------------------------------------------------------------
//  The supply-chain MAP needs to know where each part comes from. Rather than
//  tag all 24 parts by hand, we exploit a fact: the part number ALREADY encodes
//  the category. "HUS-BMP-D5X-8W" -> the "BMP" segment means bumper.
//
//  So we do two things:
//    1. CATEGORY_ORIGIN — a lookup table: category code -> facility key.
//       (This is a dict / hash map. Python: CATEGORY_ORIGIN = {"BMP": "monterrey", ...})
//    2. originForPart() — a small parser that pulls the category out of a part
//       number and looks up its facility.
//
//  NOTE: these facility assignments are our BEST GUESS from the Hussmann
//  footprint slide. The metal-exterior parts (bumper/fascia/rail/etc.) are the
//  ones to VALIDATE with Emily — they could be Bridgeton rather than Monterrey.
//  Because it's all derived from THIS one table, correcting it later is a
//  single-line edit, not a hunt through the code. (Single source of truth.)
// ----------------------------------------------------------------------------
const CATEGORY_ORIGIN = {
  // Metal exterior fabrication -> Monterrey  [VALIDATE with Emily]
  BMP: "monterrey",  // bumper
  FAS: "monterrey",  // fascia (incl. the SS-upgrade jeopardy part)
  FPL: "monterrey",  // front panel
  TRL: "monterrey",  // top rail
  SPG: "monterrey",  // splashguard
  EPL: "monterrey",  // end panel
  // Doors, glass units, shelving, lighting -> Sarasota (Doors & Glass plant)
  DR:  "sarasota",   // glass door (STYLELINE)
  LED: "sarasota",   // LED / lighting kits
  SHF: "sarasota",   // shelving
  GSK: "sarasota",   // door gasket (ships with the doors)
  // Specialty glass -> Cumberland City, TN
  ECV: "cumberland", // EcoVision door
  // Small hardware assembled at the hub itself -> Bridgeton (no inbound leg)
  HDL: "bridgeton",  // handle
};

// Parse a part number and return its origin facility key.
// split("-") turns "HUS-AM-BMP-HP8W" into ["HUS","AM","BMP","HP8W"].
// For all-makes parts the 2nd segment is "AM", so the category is the 3rd
// segment; otherwise it's the 2nd. (Python: parts = pn.split("-"); ... )
function originForPart(partNumber) {
  const seg = partNumber.split("-");
  const category = (seg[1] === "AM") ? seg[2] : seg[1];
  // The || fallback means "if the category isn't in the table, default to the
  // hub." (Python equivalent: CATEGORY_ORIGIN.get(category, "bridgeton"))
  return CATEGORY_ORIGIN[category] || "bridgeton";
}
