//  where to place that text. This keeps each function doing exactly one job.
// ----------------------------------------------------------------------------
function renderBadge(statusKey) {
  // Look up the config for this status. If the key doesn't exist, fall back
  // to "closed" so the app never crashes on bad data.
  const cfg = STATUS_CONFIG[statusKey] || STATUS_CONFIG.closed;

  // A "template string" (backticks) lets us embed variables with ${...}.
  // This is exactly like a Python f-string: f"<span ...>{cfg.label}</span>"
  return `
    <span class="badge" style="background:${cfg.bg}; color:${cfg.text};">
      <span class="dot" style="background:${cfg.dot};"></span>
      ${cfg.label}
    </span>
  `;
}


// ----------------------------------------------------------------------------
//  HELPER 2: Build one order card for the dashboard
//  ---------------------------------------------------------------------------
//  Takes a single `order` object and returns the HTML for its card.
//  We look up the current stage's NAME from the STAGES array using the
//  order's currentStage number.
// ----------------------------------------------------------------------------
function renderOrderCard(order) {
  // order.currentStage is a number like 3. STAGES is 0-indexed (starts at 0),
  // so stage number 3 lives at index 2. We subtract 1 to convert.
  const stage = STAGES[order.currentStage - 1];

  // The whole card is one big template string. The `data-id` attribute stores
  // the order's id right on the HTML element — later, when the card is clicked,
  // we read that attribute to know WHICH order to open.
  return `
    <div class="order-card" data-id="${order.id}">
      <div class="card-top">
        <div>
          <div class="cust">${order.customer}${order.national ? ' <span class="nat-tag">National</span>' : ''}</div>
          <div class="store">${order.storeLabel}</div>
        </div>
        ${renderBadge(order.status)}
      </div>
      <div class="oid">${order.id}</div>
      <div class="cases">${order.cases}</div>
      <div class="card-meta">
        <span class="card-value">${fmtMoney(order.value)}</span>
        ${renderSlaChip(order)}
      </div>
      <div class="card-bottom">
        <div class="stage-label">
          Stage ${order.currentStage} of ${STAGES.length} · <strong>${stage.name}</strong>
        </div>
        <div class="stage-label">Ships ${order.shipDate}</div>
      </div>
    </div>
  `;
}

// A small colored SLA chip: days remaining + on-time signal.
function renderSlaChip(order) {
  const sla = slaFor(order);
  if (sla.flag === "met") return '<span class="sla-chip sla-met">On time</span>';
  if (sla.flag === "breach") return '<span class="sla-chip sla-breach">' + Math.abs(sla.days) + 'd overdue</span>';
  const cls = sla.flag === "tight" ? "sla-tight" : "sla-ok";
  return '<span class="sla-chip ' + cls + '">Ships in ' + sla.days + 'd</span>';
}


// ----------------------------------------------------------------------------
//  RENDER THE DASHBOARD
//  ---------------------------------------------------------------------------
//  This takes the whole ORDERS array and fills the #orderGrid container with
//  cards — one per order.
//
//  THE .map().join("") PATTERN (learn this — it's everywhere in web dev):
//    ORDERS.map(renderOrderCard)
//      -> runs renderOrderCard on EVERY order, giving an ARRAY of HTML strings
//         (Python equivalent: [renderOrderCard(o) for o in ORDERS])
//    .join("")
//      -> glues that array into ONE big string (Python: "".join(list))
//  The result is all 6 cards' HTML concatenated, which we drop into the grid.
// ----------------------------------------------------------------------------
// dashboard state: how the rep wants their portfolio triaged.
const dashState = { sort: "risk", filter: "all", group: false };

// a numeric priority so at-risk / breaching orders sort to the top.
function statusRank(o) {
  if (o.status === "closed") return 9;
  if (o.status === "at_risk") return 0;
  const f = slaFor(o).flag;
  return f === "breach" ? 1 : f === "tight" ? 2 : 3;
}

// apply the current filter + sort to the order list.
function applyTriage(list) {
  let out = list.slice();
  if (dashState.filter === "at_risk")  out = out.filter(function (o) { return o.status === "at_risk"; });
  else if (dashState.filter === "open") out = out.filter(function (o) { return o.currentStage < 10; });
  else if (dashState.filter === "national") out = out.filter(function (o) { return o.national; });

  if (dashState.sort === "risk")
    out.sort(function (a, b) { return statusRank(a) - statusRank(b) || slaFor(a).days - slaFor(b).days; });
  else if (dashState.sort === "ship")
    out.sort(function (a, b) { return new Date(a.shipISO) - new Date(b.shipISO); });
  else if (dashState.sort === "value")
    out.sort(function (a, b) { return b.value - a.value; });
  return out;
}

// the portfolio strip: the numbers a rep triages on. Computed over ALL orders.
function renderPortfolioSummary() {
  const total   = ORDERS.reduce(function (s, o) { return s + o.value; }, 0);
  const atRisk  = ORDERS.filter(function (o) { return o.status === "at_risk"; });
  const riskVal = atRisk.reduce(function (s, o) { return s + o.value; }, 0);
  const open    = ORDERS.filter(function (o) { return o.currentStage < 10; });
  const onTime  = open.filter(function (o) { return slaFor(o).flag !== "breach"; }).length;
  const pct     = open.length ? Math.round(onTime / open.length * 100) : 100;
  return `
    <div class="pf"><div class="pf-n">${open.length}</div><div class="pf-l">Active orders</div></div>
    <div class="pf"><div class="pf-n">${fmtMoney(total)}</div><div class="pf-l">Portfolio value</div></div>
    <div class="pf"><div class="pf-n ${riskVal ? 'pf-risk' : ''}">${fmtMoney(riskVal)}</div><div class="pf-l">Revenue at risk</div></div>
    <div class="pf"><div class="pf-n ${pct < 100 ? 'pf-warn' : ''}">${pct}%</div><div class="pf-l">On-time (open)</div></div>`;
}

function renderDashboard() {
  document.getElementById("pfSummary").innerHTML = renderPortfolioSummary();
  const list = applyTriage(ORDERS);
  const grid = document.getElementById("orderGrid");

  if (dashState.group) {
    // group orders by account (national customers become a portfolio, not a card)
    const groups = {};
    list.forEach(function (o) { (groups[o.customer] = groups[o.customer] || []).push(o); });
    grid.innerHTML = Object.keys(groups).map(function (acct) {
      const os = groups[acct];
      const val  = os.reduce(function (s, o) { return s + o.value; }, 0);
      const risk = os.filter(function (o) { return o.status === "at_risk"; }).length;
      return `<div class="acct-group">
        <div class="acct-head">
          <div class="acct-name">${acct}${os[0].national ? ' <span class="nat-tag">National</span>' : ''}</div>
          <div class="acct-meta">${os.length} order${os.length > 1 ? 's' : ''} · ${fmtMoney(val)}${risk ? ` · <span class="acct-risk">${risk} at risk</span>` : ''}</div>
        </div>
        <div class="order-grid">${os.map(renderOrderCard).join("")}</div>
      </div>`;
    }).join("");
  } else {
    grid.innerHTML = `<div class="order-grid">${list.map(renderOrderCard).join("")}</div>`;
  }

  document.querySelectorAll(".order-card").forEach(function (card) {
    card.addEventListener("click", function () { openOrder(card.getAttribute("data-id")); });
  });
}


// ----------------------------------------------------------------------------
//  THE CUSTOMER-FACING PROGRESS RAIL  (the signature FedEx-style tracker)
//  ---------------------------------------------------------------------------
//  This draws the 8 stages as a horizontal rail. Stages BEFORE the current one
//  are "done" (filled navy), the current stage is "active" (highlighted), and
//  stages AFTER are "upcoming" (faint gray).
//
//  We figure out each stage's state by comparing its number to the order's
//  currentStage:
//     stage.num <  currentStage  -> done
//     stage.num == currentStage  -> active
//     stage.num >  currentStage  -> upcoming
// ----------------------------------------------------------------------------
function renderCustomerView(order) {
  // Build each stage node. .map() gives us access to the stage AND its index.
  const nodes = STAGES.map(function (stage) {
    // Decide this stage's state relative to where the order currently is.
    let state;
    if (stage.num < order.currentStage) state = "done";
    else if (stage.num === order.currentStage) state = "active";
    else state = "upcoming";

    // Return the HTML for one stage node (circle + label).
    // We tag it with a class we can style differently per state.
    return `
      <div class="rail-node ${state}">
        <div class="rail-dot">
          ${state === "done" ? "&#10003;" : stage.num}
        </div>
        <div class="rail-label">${stage.name}</div>
      </div>
    `;
  }).join("");

  // Figure out how far the connecting line should be "filled." If we're on
  // stage 4 of 8, roughly 3 of the 7 gaps between nodes are complete.
  // (currentStage - 1) gaps are done out of (total - 1) gaps.
  const pct = ((order.currentStage - 1) / (STAGES.length - 1)) * 100;

  // For a shipped order, show the carrier tracking number as an extra detail.
  const carrierBlock = order.carrierTracking
    ? `<div class="carrier">
         <span class="carrier-k">Carrier tracking</span>
         <span class="carrier-v">${order.carrierTracking}</span>
       </div>`
    : "";

  // Assemble the whole customer panel.
  return `
    <div class="panel-card">
      <div class="cust-head">
        <div>
          <div class="cust-head-title">Order status</div>
          <div class="cust-head-sub">
            Estimated ship date: <strong>${order.shipDate}</strong>
          </div>
        </div>
        ${renderBadge(order.status)}
      </div>

      <div class="rail">
        <!-- The track line sits behind the nodes; the fill shows progress -->
        <div class="rail-track"></div>
        <div class="rail-fill" style="width:${pct}%;"></div>
        <div class="rail-nodes">
          ${nodes}
        </div>
      </div>

      ${carrierBlock}
      ${renderImpactPanel(order)}
      ${customerManuals(order)}
      <div class="cust-provenance">Status updates come from Oracle (order &amp; fulfillment) and the carrier&rsquo;s tracking API. A live carrier feed is rolling out &mdash; shipping status may update on a short delay until then.</div>
    </div>
  `;
}

// ----------------------------------------------------------------------------
//  INSTALLATION GUIDES  (George's explicit ask: "here's the manual for your parts")
//  ---------------------------------------------------------------------------
//  DERIVED, not hardcoded: we read this order's own parts and pull the component
//  name out of each description ("Bumper, 8ft, White" -> "Bumper"), dedup, and
//  list one guide per component. So every order automatically shows the right
//  guides, and a data change can't leave a stale hardcoded list behind.
//
//  CUSTOMER-SAFE: component names only — never the internal part numbers that
//  the INTERNAL view shows. Same two-layer principle the rest of the demo uses.
//
//  Python parallel (dedup while preserving order):
//    seen, guides = set(), []
//    for p in order["parts"]:
//        comp = p["desc"].split(",")[0].strip()
//        if comp and comp not in seen:
//            seen.add(comp); guides.append(comp)
// ----------------------------------------------------------------------------
function customerManuals(order) {
  const seen = {}; const guides = [];
  (order.parts || []).forEach(function (p) {
    const comp = String(p.desc || "").split(",")[0].trim();   // "Bumper, 8ft, White" -> "Bumper"
    if (!comp || seen[comp]) return;
    seen[comp] = true;
    guides.push(comp);
  });
  if (!guides.length) return "";
  return `
    <div class="cust-manuals">
      <div class="cm-head">
        <div class="cm-title">Installation guides for your order</div>
        <div class="cm-sub">The manual for each part in your refresh.</div>
      </div>
      <div class="cm-list">
        ${guides.map(function (g) {
          return `<a class="cm-item" href="#" onclick="return false;">
                    <span class="cm-ic">&#128196;</span>
                    <span class="cm-name">${g} &mdash; Installation Guide</span>
                    <span class="cm-meta">PDF</span>
                  </a>`;
        }).join("")}
      </div>
    </div>`;
}


// ----------------------------------------------------------------------------
//  CUSTOMER REFRESH SUMMARY  (reframed — was "Projected store impact")
//  ---------------------------------------------------------------------------
//  WHY THIS CHANGED. This panel used to claim an "8–12% refresh sales lift" and
//  a "~2.4 yr payback." Emily's ROI meeting established those can't be validated:
//  conversion (quote -> order) isn't measurable because the CRM records one
//  opportunity per store, so a won 150-store bid lands as ~75 "yes" and ZERO
//  "no" records. A rate needs a denominator, and the losses were never captured.
//  The payback figure was derived FROM the lift, so it inherits the same defect.
//  Showing a fabricated number to a customer is a credibility risk we don't need.
//
//  THE REFRAME (the transferable idea): the qualitative DIRECTION is defensible
//  even when the precise NUMBER is not. A refresh genuinely does cost and disrupt
//  less than a full replacement — every internal estimate agrees on the direction
//  and only disagrees on the magnitude (~50% per Emily vs. 75–77% per refresh
//  leadership). So we state the direction and drop the number. Everything in the
//  grid below is now read straight from the customer's own order — no estimates.
//
//  Program-level ROI (quote turn-time, travel avoided, quoter capacity) is a
//  HUSSMANN-internal story for a different audience — it lives in the separate
//  impact dashboard, not in a customer's order tracker.
// ----------------------------------------------------------------------------
function renderImpactPanel(order) {
  // Every figure here is a FACT from this order, not a projection.
  const partCount = (order.parts || []).length;
  const installLabel = order.installDate || "To be scheduled";
  return `
    <div class="impact">
      <div class="impact-head">
        <span class="impact-title">Your refresh at a glance</span>
        <span class="impact-tag">From your order</span>
      </div>
      <div class="impact-grid">
        <div><div class="impact-n">${fmtMoney(order.value)}</div><div class="impact-l">Refresh investment</div></div>
        <div><div class="impact-n">${partCount}</div><div class="impact-l">Parts included</div></div>
        <div><div class="impact-n" style="font-size:17px;">${installLabel}</div><div class="impact-l">Install scheduled</div></div>
      </div>
      <div class="impact-note">A refresh restores the appearance of your existing cases and extends their service life &mdash; with less cost and less disruption to the store than a full case replacement.</div>
    </div>`;
}


// ----------------------------------------------------------------------------
//  THE INTERNAL PARTS VIEW  (the admin table — the "why two layers matter")
//  ---------------------------------------------------------------------------
//  This is the view Mike asked for. It shows the SAME order the customer sees,
//  but with part-level truth: which parts are ready, which are delayed, and
//  which are in "jeopardy" (will miss the ship date).
//
//  The demo story: the customer sees "In Production — At Risk" with no detail,
//  while internally we can see one backordered part will blow the ship date by
//  11 days. Keith's manual Excel report is what this replaces.
//
//  NEW CONCEPT — DERIVING A SUMMARY FROM DATA:
//  Instead of hardcoding "1 part in jeopardy," we COUNT them by filtering the
//  parts array. .filter() keeps only items that pass a test, then .length is
//  how many survived. (Python: len([p for p in parts if p["riskLevel"]==...]))
// ----------------------------------------------------------------------------
// ----------------------------------------------------------------------------
//  BOTTLENECK + INSTALL/CLOSEOUT blocks (added features)
//  ---------------------------------------------------------------------------
//  These surface the two real refresh delays the team described: waiting on the
//  Parts ID team, and the configured-parts re-order hop through Oracle BGN.
//  The install block extends tracking past "Delivered" into the closeout tail.
// ----------------------------------------------------------------------------
function renderBottleneck(order) {
  if (!order.bottleneck) return "";
  return `<div class="bottleneck">
      <span class="bn-icon">&#9888;</span>
      <div class="bn-body">
        <div class="bn-title">Blocked &middot; waiting on ${order.bottleneck.team}</div>
        <div class="bn-note">${order.bottleneck.note}</div>
      </div>
      <span class="bn-tag">tracked blocker</span>
    </div>`;
}

function renderInstallBlock(order) {
  const s = order.currentStage;
  const statusText = s >= 10 ? "Complete &middot; project closed"
                   : s === 9 ? "In progress &middot; crew on site"
                   : s === 8 ? "Scheduled"
                   : "Not yet scheduled";
  return `<div class="install-block">
      <div class="ib-head">Install &amp; closeout</div>
      <div class="ib-grid">
        <div><div class="ib-l">Install date</div><div class="ib-v">${order.installDate || "TBD"}</div></div>
        <div><div class="ib-l">Crew</div><div class="ib-v">${order.installCrew || "Unassigned"}</div></div>
        <div><div class="ib-l">Status</div><div class="ib-v">${statusText}</div></div>
      </div>
    </div>`;
}

function renderInternalView(order) {
  // --- Step 1: derive the risk counts from the parts array ---
  // .filter() returns a NEW array containing only the parts that match.
  const delayedParts  = order.parts.filter(function (p) { return p.riskLevel === "delayed"; });
  const jeopardyParts = order.parts.filter(function (p) { return p.riskLevel === "jeopardy"; });

  const delayedCount  = delayedParts.length;
  const jeopardyCount = jeopardyParts.length;
  const totalParts    = order.parts.length;

  // --- Step 2: build the alert banner based on those counts ---
  // The banner changes tone depending on severity. This is the moment that
  // sells the whole demo, so the copy is specific and actionable.
  let banner;
  if (jeopardyCount > 0) {
    // Find the worst part to name it specifically in the warning.
    const worst = jeopardyParts[0];
    banner = `
      <div class="risk-banner jeopardy">
        <div class="risk-banner-icon">!</div>
        <div class="risk-banner-body">
          <div class="risk-banner-title">Ship date in jeopardy</div>
          <div class="risk-banner-text">
            ${jeopardyCount} part${jeopardyCount > 1 ? "s" : ""} will miss the
            ${order.shipDate} ship date. <strong>${worst.desc}</strong>
            (${worst.partNumber}) is not expected until ${worst.expected}.
            The customer view still shows "on track" — flag for PM decision.
          </div>
        </div>
      </div>
    `;
  } else if (delayedCount > 0) {
    banner = `
      <div class="risk-banner delayed">
        <div class="risk-banner-icon">&#9888;</div>
        <div class="risk-banner-body">
          <div class="risk-banner-title">${delayedCount} part${delayedCount > 1 ? "s" : ""} delayed</div>
          <div class="risk-banner-text">
            Recoverable within the current ship window, but monitor closely.
          </div>
        </div>
      </div>
    `;
  } else {
    banner = `
      <div class="risk-banner clear">
        <div class="risk-banner-icon">&#10003;</div>
        <div class="risk-banner-body">
          <div class="risk-banner-title">All parts on track</div>
          <div class="risk-banner-text">
            No delays or jeopardy flags. ${totalParts} parts in this order.
          </div>
        </div>
      </div>
    `;
  }

  // --- Step 3: build one table row per part ---
  // We .map() the parts into <tr> rows. Each row's risk cell is colored using
  // the RISK_CONFIG lookup from data.js.
  const rows = order.parts.map(function (part) {
    const risk = RISK_CONFIG[part.riskLevel] || RISK_CONFIG.none;

    // The risk cell: a plain dash for "none", a colored pill otherwise.
    const riskCell = part.riskLevel === "none"
      ? `<span class="risk-none">&mdash;</span>`
      : `<span class="risk-pill" style="background:${risk.bg}; color:${risk.text};">${risk.label}</span>`;

    // Highlight the whole row faintly if it has any risk, to draw the eye.
    const rowClass = part.riskLevel === "jeopardy" ? "row-jeopardy"
                   : part.riskLevel === "delayed"  ? "row-delayed"
                   : "";

    return `
      <tr class="${rowClass}">
        <td class="mono">${part.partNumber}</td>
        <td>${part.desc}</td>
        <td class="num">${part.qty}</td>
        <td>${part.status}</td>
        <td>${part.expected}</td>
        <td class="note">${part.note}</td>
        <td>${riskCell}</td>
      </tr>
    `;
  }).join("");

  // --- Step 4: assemble the whole internal panel ---
  return `
    <div class="panel-card">
      ${banner}
      ${renderBottleneck(order)}
      ${renderInstallBlock(order)}

      <div class="map-section">
        <div class="map-section-head">
          <div class="internal-sub" style="margin-bottom:0">
            Supply chain &middot; where each part is manufactured and how it converges
            at the Bridgeton hub. Click a facility to isolate its route.
          </div>
        </div>
        <div class="map-holder">
          <div class="map-tip" id="mapTip"></div>
          <div id="orderMap"></div>
        </div>
      </div>

      <div class="internal-sub">
        Part-level status &middot; auto-generated from Oracle inventory and
        production data. Replaces the manual Refresh Refurb Report.
      </div>

      <div class="table-wrap">
        <table class="parts-table">
          <thead>
            <tr>
              <th>Part Number</th>
              <th>Description</th>
              <th class="num">Qty</th>
              <th>Status</th>
              <th>Expected</th>
              <th>Buyer Note</th>
              <th>Risk</th>
            </tr>
          </thead>
          <tbody>
            ${rows}
          </tbody>
        </table>
      </div>

      ${renderCopilotPanel(order)}
    </div>
  `;
}


// ----------------------------------------------------------------------------
//  THE SUPPLY-CHAIN MAP  (rendered inside the Internal View, per order)
//  ---------------------------------------------------------------------------
//  This is the integrated version of the standalone interactive map. Two key
//  differences from the standalone:
//    1. It's SCOPED TO ONE ORDER — we're already inside an order's detail view,
//       so the map shows THIS order's supply chain (not an "all orders" view).
//    2. Its routes are DERIVED from the order's parts (via originForPart), not
//       hardcoded. The map and the parts table read the same source, so they
//       can never disagree.
//
//  STATE MODEL (same state -> render pattern, smaller scope):
//    mapSelected = null            -> show the whole order's supply chain
//    mapSelected = "monterrey"     -> isolate just that facility's route(s)
//  A click sets mapSelected and re-renders; clicking empty space clears it.
// ----------------------------------------------------------------------------

let mapSelected = null;   // which facility is isolated (null = show all legs)

// --- Derive this order's legs from its parts -------------------------------
// STEP A: group the parts by origin facility, tracking the worst risk in each
//   group (jeopardy > delayed > none). One inbound leg per origin facility.
// STEP B: add the final hub -> store leg, whose state comes from the order's
//   stage (shipped or later = moving/arrived; earlier = still waiting).
// This is the same "derive a summary from the data" idea as the risk banner:
// we COMPUTE the routes instead of storing them separately.
function deriveOrderLegs(order) {
  // Rank risk so we can keep the "worst" per origin. (An object used as a
  // lookup of severity — Python: RANK = {"none":0,"delayed":1,"jeopardy":2}.)
  const RANK = { none: 0, delayed: 1, jeopardy: 2 };
  const byOrigin = {};   // origin key -> { worstRisk, anyMoving, count }

  order.parts.forEach(function (part) {
    const origin = originForPart(part.partNumber);
    if (origin === "bridgeton") return;   // made at the hub -> no inbound leg

    // First time we see this origin, initialize its accumulator.
    if (!byOrigin[origin]) byOrigin[origin] = { worst: "none", moving: false };

    // Keep the worst risk seen from this origin.
    if (RANK[part.riskLevel] > RANK[byOrigin[origin].worst]) {
      byOrigin[origin].worst = part.riskLevel;
    }
    // "moving" if any part from here is still in production / queued / backordered.
    if (["In Production", "Queued", "Backordered"].includes(part.status)) {
      byOrigin[origin].moving = true;
    }
  });

  // Turn the grouped origins into leg objects with a visual state.
  const legs = [];
  Object.keys(byOrigin).forEach(function (origin) {
    const g = byOrigin[origin];
    // Map the group's condition to one of the four visual leg states.
    let state;
    if (g.worst === "jeopardy") state = "stuck";       // red, halted
    else if (g.worst === "delayed" || g.moving) state = "moving"; // blue, animated
    else state = "complete";                            // navy, arrived at hub
    legs.push({ from: origin, to: "bridgeton", state: state });
  });

  // The final delivery leg: hub -> store. Its state tracks the order's stage.
  // Stage 6 = Shipped, so >=6 means the truck has left the hub.
  const finalState = order.currentStage >= 6 ? "moving"
                   : order.currentStage >= 5 ? "moving"   // packing -> imminent
                   : "waiting";
  legs.push({ from: "bridgeton", to: "__store", state: finalState });

  return legs;
}

// --- Geometry helper: curved path between two projected points -------------
function mapArc(a, b, curve) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
  const cx = mx - dy * curve, cy = my + dx * curve;
  return "M " + a.x + " " + a.y + " Q " + cx + " " + cy + " " + b.x + " " + b.y;
}

// Resolve a leg endpoint key to its {x,y}. "__store" is the special token for
// THIS order's destination store; anything else is a facility.
function mapNodeXY(key, order) {
  if (key === "__store") return MAP_GEO.storesByOrder[order.id];
  return MAP_GEO.facilities.find(function (f) { return f.key === key; });
}

// --- Build the SVG markup for the whole map, for one order -----------------
function renderOrderMap(order) {
  const legs = deriveOrderLegs(order);
  const store = MAP_GEO.storesByOrder[order.id];

  // Which facilities are actually involved in this order? (Used to keep
  // uninvolved plants faint — context, not clutter.) A Set holds unique keys.
  const involved = new Set();
  legs.forEach(function (l) {
    if (l.from !== "__store") involved.add(l.from);
    if (l.to !== "__store") involved.add(l.to);
  });

  // Legs markup. A leg is "active" (bright) unless a facility is isolated and
  // this leg doesn't touch it.
  const legMarkup = legs.map(function (l) {
    const a = mapNodeXY(l.from, order), b = mapNodeXY(l.to, order);
    if (!a || !b) return "";
    const curve = l.from === "bridgeton" ? 0.12 : 0.18;
    const active = (mapSelected === null) || (l.from === mapSelected || l.to === mapSelected);
    return '<path class="mleg ' + l.state + (active ? " on" : "") + '" d="' + mapArc(a, b, curve) + '"></path>';
  }).join("");

  // Facility node markup. Involved facilities are full-strength; others faint.
  const facMarkup = MAP_GEO.facilities.map(function (f) {
    const isHub = f.role === "hub";
    const r = isHub ? 8 : 5.5;
    const inThis = involved.has(f.key);
    const isolated = (mapSelected !== null);
    const on = inThis && (!isolated || f.key === mapSelected || f.key === "bridgeton");
    return '<g class="mnode facility ' + (inThis ? "involved" : "context") + (on ? " on" : "") + '"'
         + ' data-key="' + f.key + '" data-name="' + f.name + '" data-makes="' + f.makes + '"'
         + ' transform="translate(' + f.x + ',' + f.y + ')">'
         + '<circle class="mhalo" r="' + (r + 6) + '"></circle>'
         + '<circle class="mdot ' + (isHub ? "hub" : "plant") + '" r="' + r + '"></circle>'
         + (isHub ? '<circle r="2.5" fill="#fff"></circle>' : "")
         + '<text class="mlabel" y="' + (r + 13) + '">' + f.name + '</text>'
         + '</g>';
  }).join("");

  // The destination store node (diamond).
  const storeMarkup = store
    ? '<g class="mnode store on" transform="translate(' + store.x + ',' + store.y + ')">'
      + '<rect class="mdiamond" x="-5" y="-5" width="10" height="10" transform="rotate(45)"></rect>'
      + '<text class="mstore-label" y="17">' + store.name.split(",")[0] + '</text>'
      + '</g>'
    : "";

  // Assemble the SVG. The `focused` class is on when a facility is isolated.
  return '<svg class="supply-map ' + (mapSelected ? "focused" : "") + '" viewBox="' + MAP_GEO.viewBox + '" xmlns="http://www.w3.org/2000/svg">'
       + '<path class="mstate context" d="' + MAP_GEO.paths.mexico + '"></path>'
       + '<path class="mstate" d="' + MAP_GEO.paths.states + '"></path>'
       + '<g class="mlegs">' + legMarkup + '</g>'
       + storeMarkup
       + facMarkup
       + '</svg>';
}

// --- Wire up map interactivity after it's inserted into the page -----------
// Called each time we (re)draw the map. Attaches click handlers that follow
// the same rule as every other handler: change state, then re-render.
function wireMapEvents(order) {
  const container = document.getElementById("orderMap");
  if (!container) return;

  // Click a facility node -> isolate it (or clear if it's already selected).
  container.querySelectorAll(".mnode.facility.involved").forEach(function (node) {
    node.addEventListener("click", function (e) {
      e.stopPropagation();
      const key = node.getAttribute("data-key");
      mapSelected = (mapSelected === key) ? null : key;   // toggle
      drawMap(order);                                     // re-render
    });
  });

  // Click empty map space -> clear the isolation.
  const svg = container.querySelector(".supply-map");
  if (svg) svg.addEventListener("click", function () { mapSelected = null; drawMap(order); });

  // Hover tooltips on facilities.
  const tip = document.getElementById("mapTip");
  container.querySelectorAll(".mnode.facility").forEach(function (node) {
    node.addEventListener("mousemove", function (e) {
      tip.innerHTML = '<div class="tname">' + node.getAttribute("data-name") + '</div>'
                    + '<div class="tmakes">' + node.getAttribute("data-makes") + '</div>';
      const rect = container.getBoundingClientRect();
      tip.style.left = (e.clientX - rect.left + 14) + "px";
      tip.style.top = (e.clientY - rect.top + 14) + "px";
      tip.style.opacity = 1;
    });
    node.addEventListener("mouseleave", function () { tip.style.opacity = 0; });
  });
}

// Draw (or redraw) the map for an order, then re-attach its events.
// (We rebuild innerHTML each time, so events must be re-wired after — the old
//  elements are gone. Simple and correct for a map this size.)
function drawMap(order) {
  const container = document.getElementById("orderMap");
  if (!container) return;
  container.innerHTML = renderOrderMap(order);
  wireMapEvents(order);
}


// ----------------------------------------------------------------------------
//  COPILOT ASSISTANT  ("Mike's inbox" — read email, answer, draft reply)
//  ---------------------------------------------------------------------------
//  This simulates Microsoft Copilot grounded in the order data. It shows a
//  customer email, and on request produces a status answer + a draftable reply.
//
//  ARCHITECTURE / THE SWAPPABLE SEAM:
//    getCopilotAnswer(order) is the ONE function that produces the AI text.
//    Today it composes the answer LOCALLY from order data (Option B, simulated
//    — safe + reliable for a live demo). In production you'd replace its body
//    with a call to your backend proxy (Option A). Everything else stays the
//    same. This is the "swappable data source" idea again: isolate the thing
//    that might change behind one function so the rest of the app doesn't care.
//
//  WHY NOT CALL THE REAL API HERE? The API key can't live in client-side JS on
//  GitHub Pages — anyone could read it via View Source and run up charges. See
//  the fully-commented real-API version at the bottom of this section to learn
//  how the production path works through a proxy.
// ----------------------------------------------------------------------------

// --- The "brain": compose a grounded status answer from the order data ------
// This is template-based natural-language generation. The key idea is
// GROUNDING: every sentence is derived from real fields on `order`, so the
// assistant never invents facts. That's exactly what makes enterprise Copilot
// trustworthy vs. a generic chatbot — it reasons over YOUR data.
function getCopilotAnswer(order) {
  const stage = STAGES[order.currentStage - 1];
  const store = MAP_GEO.storesByOrder[order.id];
  const storeName = store ? store.name : order.customer;

  // Derive part-status counts (same .filter() pattern as the risk banner).
  const jeopardy = order.parts.filter(function (p) { return p.riskLevel === "jeopardy"; });
  const delayed  = order.parts.filter(function (p) { return p.riskLevel === "delayed"; });
  const ready    = order.parts.filter(function (p) {
    return ["In Stock", "Ready", "Packed", "Shipped", "Installed"].includes(p.status);
  });

  // Build the answer in pieces, then join. (Like building a list of sentences
  // and "\n".join()-ing them in Python.)
  const lines = [];
  lines.push("This is " + storeName + " (order " + order.id + ").");
  lines.push("Current status: " + stage.name + ", stage " + order.currentStage +
             " of 8. Estimated ship date " + order.shipDate + ".");
  lines.push(ready.length + " of " + order.parts.length +
             " parts are ready or already moving.");

  // Risk-aware branch — the assistant gives DIFFERENT advice by situation.
  if (jeopardy.length > 0) {
    const j = jeopardy[0];
    lines.push("\u26A0 Heads up: " + j.desc + " (" + j.partNumber + ") is " +
               j.status.toLowerCase() + " and not expected until " + j.expected +
               ", which puts the " + order.shipDate + " ship date at risk.");
    lines.push("Recommendation: reply to confirm the order is progressing but " +
               "avoid committing to the exact date until we verify the timeline. " +
               "Want me to draft a careful holding reply?");
  } else if (delayed.length > 0) {
    lines.push("One part is running behind but is still recoverable within the " +
               "current window. Recommendation: reassure the customer we're on " +
               "track. Want me to draft a reply?");
  } else if (order.currentStage >= 6) {
    lines.push("Good news — this order has shipped" +
               (order.carrierTracking ? " (tracking " + order.carrierTracking + ")" : "") +
               ". Want me to draft a reply with the tracking details?");
  } else {
    lines.push("Everything is on track. Want me to draft a reply confirming the " +
               "timeline for the customer?");
  }
  return lines.join("\n\n");
}

// --- CONTACT ROUTING: who should really answer this email? ------------------
//  The classifier. It scores each expert by how strongly the email (plus the
//  order's own characteristics) matches their domain, then returns the best
//  match ONLY IF it clears a confidence bar. Below the bar -> return null,
//  meaning "no specialist needed, Mike's got this."
//
//  THE PATTERN (learn this shape — it's everywhere in data work):
//    map   -> score every candidate            (Python: list comprehension)
//    sort  -> order by score, best first        (Python: sorted(key=...))
//    pick  -> take the top IF it clears a bar    (Python: x if cond else None)
//  This "score / sort / threshold" trio is the skeleton of ranking, search,
//  recommendation, and classification systems alike.
function recommendContact(order, email) {
  // Build one lowercase "haystack" of everything we can match against: the
  // email subject + body AND the order's own description (so an all-makes
  // ORDER routes to Shawn even if the email doesn't say "all-makes"). Grounding
  // from two sources at once. .toLowerCase() makes matching case-insensitive.
  const haystack = (email.subject + " " + email.body + " " + order.cases).toLowerCase();

  // Score each expert: +1 for every keyword of theirs that appears.
  // .map() transforms the directory into a list of {expert, score, hits}.
  // (Python: scored = [score_one(e) for e in EXPERT_DIRECTORY])
  const scored = EXPERT_DIRECTORY.map(function (expert) {
    const hits = expert.keywords.filter(function (kw) { return haystack.includes(kw); });
    return { expert: expert, score: hits.length, hits: hits };
  });

  // Sort by score, highest first. (Python: scored.sort(key=lambda s: -s["score"]))
  // The comparator returns positive/negative to order b before/after a.
  scored.sort(function (a, b) { return b.score - a.score; });

  // The confidence bar: require at least ONE keyword hit. (Bump to >=2 if you
  // want to only route on strong signals.) No hit -> Mike handles it himself.
  const best = scored[0];
  if (!best || best.score === 0) return null;
  return best;   // { expert, score, hits }
}

// --- Compose an INTRO email from Mike to the recommended expert -------------
// Parallel to getCopilotDraft, but this draft loops in the specialist with
// context, rather than replying to the customer. Grounded in email + order.
function getContactIntroDraft(order, rec) {
  const email = CUSTOMER_EMAILS[order.id];
  const customerFirst = email.fromName.split(",")[0];
  const topic = rec.hits.slice(0, 2).join(" / ");   // the matched signals
  return "Hi " + rec.expert.name.split(" ")[0] + ",\n\n"
    + "Quick loop-in: " + customerFirst + " at " + order.customer + " (order "
    + order.id + ") reached out about " + topic + ". Since you own "
    + rec.expert.owns.split(",")[0] + ", you can speak to this better than I can. "
    + "Can you take the lead on the answer? Happy to stay cc'd since I've got the "
    + "account relationship.\n\nThanks,\nMike";
}

// --- Compose a SANITIZED customer-facing reply ------------------------------
// The two-layer principle in action: internally we know the jeopardy detail,
// but the customer draft is diplomatic and does NOT expose the backorder. The
// PM decides what to disclose. This is why the internal/customer split matters.
function getCopilotDraft(order) {
  const store = MAP_GEO.storesByOrder[order.id];
  const first = "Hi " + (CUSTOMER_EMAILS[order.id] ? CUSTOMER_EMAILS[order.id].fromName.split(",")[0] : "there") + ",";
  const jeopardy = order.parts.filter(function (p) { return p.riskLevel === "jeopardy"; });

  let middle;
  if (jeopardy.length > 0) {
    // Careful, non-committal — does NOT mention the backordered part.
    middle = "Thanks for checking in. Your " + order.customer + " refresh order is " +
             "actively in production and progressing well. We're finalizing a couple " +
             "of components and want to give you an accurate delivery date rather than " +
             "an estimate \u2014 I'll confirm the firm ship date with you by end of week.";
  } else if (order.currentStage >= 6) {
    middle = "Good news \u2014 your order has shipped" +
             (order.carrierTracking ? " and is on its way. Your tracking number is " + order.carrierTracking + "." : ".") +
             " We'll keep you posted through delivery.";
  } else {
    middle = "Happy to update you. Your " + order.customer + " refresh order is on " +
             "track and currently in " + STAGES[order.currentStage - 1].name.toLowerCase() +
             ". We're still targeting a " + order.shipDate + " ship date.";
  }
  return first + "\n\n" + middle + "\n\nBest,\nMike";
}

// --- Typewriter effect: reveal text progressively (feels "live") ------------
// Reveals `text` one chunk at a time into `el`, then calls done(). Uses
// setInterval — a browser timer that runs a function repeatedly. (Python's
// closest analogy is time.sleep in a loop, but JS is non-blocking so we use a
// timer callback instead of sleeping.)
function typewriter(el, text, done) {
  el.textContent = "";
  let i = 0;
  const step = 2;                       // characters per tick (speed)
  const timer = setInterval(function () {
    i += step;
    el.textContent = text.slice(0, i);
    if (i >= text.length) {
      clearInterval(timer);             // stop the timer when finished
      if (done) done();
    }
  }, 12);
}

// --- Wire the Copilot buttons after the panel is inserted -------------------
function wireCopilot(order) {
  const askBtn = document.getElementById("askCopilot");
  if (!askBtn) return;

  askBtn.addEventListener("click", function () {
    const box = document.getElementById("copilotResponse");
    const textEl = document.getElementById("copilotText");
    const draftActions = document.getElementById("draftActions");
    box.style.display = "block";
    askBtn.disabled = true;
    askBtn.textContent = "Copilot is reading the order\u2026";

    // Simulate a brief "thinking" delay, then type the grounded answer.
    // setTimeout runs a function ONCE after a delay (ms). This mimics the
    // latency of a real API round-trip without actually calling one.
    setTimeout(function () {
      const answer = getCopilotAnswer(order);   // <-- the swappable seam
      typewriter(textEl, answer, function () {
        draftActions.style.display = "block";   // reveal "Draft a reply" when done

        // ROUTING: after answering, decide if a specialist should be looped in.
        // recommendContact returns null when Mike's got it (no card shown).
        const rec = recommendContact(order, CUSTOMER_EMAILS[order.id]);
        if (rec) {
          document.getElementById("contactName").textContent = rec.expert.name;
          document.getElementById("contactRole").textContent = rec.expert.role;
          document.getElementById("contactReason").textContent =
            "This email touches " + rec.hits.slice(0, 2).join(" / ") + " \u2014 "
            + rec.expert.name.split(" ")[0] + " owns " + rec.expert.owns.split(",")[0]
            + " and can answer this directly.";
          document.getElementById("copilotContact").style.display = "block";
        }
      });
      askBtn.textContent = "Answered \u2713";
    }, 650);
  });

  // "Draft a reply" -> compose + type the sanitized customer email.
  // We attach DIRECTLY to the button (not to document) so listeners don't
  // stack up each time a new order opens. The button is recreated per order,
  // so its handlers are fresh each time. (Attaching to `document` here would
  // leak a new listener on every openOrder — a common interactive-UI bug.)
  const draftBtn = document.getElementById("draftReply");
  if (draftBtn) {
    draftBtn.addEventListener("click", function () {
      const card = document.getElementById("draftCard");
      const draftText = document.getElementById("draftText");
      card.style.display = "block";
      typewriter(draftText, getCopilotDraft(order));
    });
  }

  // "Draft intro" -> compose + type an intro email to the recommended expert.
  // Attached directly to the button (same anti-leak reasoning as above).
  const introBtn = document.getElementById("draftIntro");
  if (introBtn) {
    introBtn.addEventListener("click", function () {
      const rec = recommendContact(order, CUSTOMER_EMAILS[order.id]);
      if (!rec) return;
      const card = document.getElementById("introCard");
      const introText = document.getElementById("introText");
      card.style.display = "block";
      typewriter(introText, getContactIntroDraft(order, rec));
    });
  }
}

// ----------------------------------------------------------------------------
//  OPEN AN ORDER (switch from dashboard to detail view)
//  ---------------------------------------------------------------------------
//  Given an order id, find that order in the data, then:
//    - hide the dashboard, show the detail section
//    - fill the detail header
//    - render the customer view (internal view comes in the next piece)
//    - reset tabs so we always start on "Customer View"
// ----------------------------------------------------------------------------
function openOrder(orderId) {
  // .find() returns the FIRST array item where the test is true.
  // (Python: next(o for o in ORDERS if o["id"] == orderId))
  const order = ORDERS.find(function (o) { return o.id === orderId; });
  if (!order) return;   // safety: if not found, do nothing

  // Remember which order is open, so the tab switcher knows what to show.
  currentOrder = order;

  // Toggle the two big sections.
  document.getElementById("dashboard").classList.add("hidden");
  document.getElementById("detail").classList.add("active");

  // Fill the detail header with this order's summary.
  document.getElementById("detailHeader").innerHTML = `
    <div>
      <div class="dh-cust">${order.customer}</div>
      <div class="dh-store">${order.storeLabel}</div>
      <div class="dh-meta">
        <div class="item">
          <div class="k">Order ID</div>
          <div class="v mono">${order.id}</div>
        </div>
        <div class="item">
          <div class="k">Cases</div>
          <div class="v">${order.cases}</div>
        </div>
        <div class="item">
          <div class="k">Ship Date</div>
          <div class="v">${order.shipDate}</div>
        </div>
      </div>
    </div>
    ${renderBadge(order.status)}
  `;

  // Render both panels now.
  document.getElementById("panel-customer").innerHTML = renderCustomerView(order);
  document.getElementById("panel-internal").innerHTML = renderInternalView(order);

  // Draw the supply-chain map inside the internal panel. Reset the map's
  // isolation state so each newly opened order starts showing its full chain.
  mapSelected = null;
  drawMap(order);

  // Wire the Copilot assistant panel (email -> answer -> draft reply).
  wireCopilot(order);

  // Always start on the Customer View tab when opening an order.
  switchTab("customer");
}


// ----------------------------------------------------------------------------
//  TAB SWITCHING
//  ---------------------------------------------------------------------------
//  Shows one panel, hides the other, and moves the active underline. Works by
//  adding/removing the "active" CSS class on the right elements.
// ----------------------------------------------------------------------------
function switchTab(tabName) {
  // Update the tab BUTTONS (the underline highlight).
  document.querySelectorAll(".tab").forEach(function (btn) {
    // .toggle(class, condition) adds the class if condition is true,
    // removes it if false. Clean way to set exactly one tab active.
    btn.classList.toggle("active", btn.getAttribute("data-tab") === tabName);
  });

  // Update the PANELS (which content shows).
  document.getElementById("panel-customer")
    .classList.toggle("active", tabName === "customer");
  document.getElementById("panel-internal")
    .classList.toggle("active", tabName === "internal");
}


// ----------------------------------------------------------------------------
//  GO BACK TO THE DASHBOARD
// ----------------------------------------------------------------------------
function showDashboard() {
  document.getElementById("dashboard").classList.remove("hidden");
  document.getElementById("detail").classList.remove("active");
}


// ----------------------------------------------------------------------------
//  STARTUP / WIRING
//  ---------------------------------------------------------------------------
//  This runs once when the page loads. It renders the dashboard and attaches
//  the click handlers for the back button and the tabs.
//
//  `currentOrder` is declared at the top level so multiple functions can share
//  it — it remembers which order is currently open. (This is a module-level
//  variable, like a global in a Python script.)
// ----------------------------------------------------------------------------
let currentOrder = null;

// ----------------------------------------------------------------------------
//  LIVE PUSH UPDATES (webhook simulation) — added feature
//  ---------------------------------------------------------------------------
//  A real tracker doesn't wait for you to refresh — the SERVER pushes an event
//  when something changes (a webhook). That's the inverse of the request/response
//  you normally fetch: the update comes TO you. We simulate it with a scripted
//  queue that fires on a timer, mutates the order, re-renders, and toasts.
// ----------------------------------------------------------------------------
const PUSH_EVENTS = [
  { id: "ORD-2026-06990", kind: "stage",   to: 3, label: "Kroger #305 entered production" },
  { id: "ORD-2026-06455", kind: "resolve", label: "Walmart #3847 — Oracle BGN re-order cleared" },
  { id: "ORD-2026-06102", kind: "stage",   to: 6, label: "Publix #1192 shipped — carrier assigned", carrier: "FDX-8821-4407-1190" },
  { id: "ORD-2026-06891", kind: "stage",   to: 4, label: "Kroger #200 passed quality check" },
  { id: "ORD-2026-06520", kind: "resolve", label: "Walmart #2140 — Parts ID confirmed serial match" },
  { id: "ORD-2026-05788", kind: "stage",   to: 7, label: "Fresh Thyme #12 delivered to store" },
];
let pushIndex = 0;

function applyPushEvent(ev) {
  const o = ORDERS.find(function (x) { return x.id === ev.id; });
  if (!o) return false;
  if (ev.kind === "stage") {
    if (o.currentStage >= ev.to) return false;          // already past — skip
    o.currentStage = ev.to;
    if (ev.carrier) o.carrierTracking = ev.carrier;
    if (ev.to >= 7 && o.status === "at_risk") o.status = "on_track";
  } else if (ev.kind === "resolve") {
    if (!o.bottleneck) return false;
    o.bottleneck = null;
    if (o.status === "at_risk") o.status = "on_track";
  }
  return true;
}

function showToast(label, kind) {
  const el = document.createElement("div");
  el.className = "toast" + (kind === "resolve" ? " resolve" : "");
  el.innerHTML = '<div class="toast-t">Live update</div><div class="toast-m">' + label + '</div>';
  document.getElementById("toastWrap").appendChild(el);
  setTimeout(function () {
    el.style.transition = "opacity .4s"; el.style.opacity = "0";
    setTimeout(function () { el.remove(); }, 400);
  }, 4200);
}

function startLivePush() {
  setInterval(function () {
    if (pushIndex >= PUSH_EVENTS.length) return;        // queue drained
    const ev = PUSH_EVENTS[pushIndex++];
    if (!applyPushEvent(ev)) return;
    showToast(ev.label, ev.kind);
    renderDashboard();
    // if the changed order is open in the detail view, rebuild it live
    if (currentOrder && currentOrder.id === ev.id) openOrder(ev.id);
  }, 6000);
}


function init() {
  // 1. Draw the dashboard cards.
  renderDashboard();

  // 2. Back button returns to the dashboard.
  document.getElementById("backBtn")
    .addEventListener("click", showDashboard);

  // 3. Each tab button switches tabs when clicked.
  document.querySelectorAll(".tab").forEach(function (btn) {
    btn.addEventListener("click", function () {
      switchTab(btn.getAttribute("data-tab"));
    });
  });

  // 4. Triage controls re-render the dashboard on change.
  document.getElementById("triageSort").addEventListener("change", function () {
    dashState.sort = this.value; renderDashboard();
  });
  document.getElementById("triageFilter").addEventListener("change", function () {
    dashState.filter = this.value; renderDashboard();
  });
  document.getElementById("triageGroup").addEventListener("click", function () {
    dashState.group = !dashState.group;
    this.classList.toggle("on", dashState.group);
    renderDashboard();
  });

  // 5. Start the live push feed (webhook simulation).
  startLivePush();
}

// Run init() as soon as the page's HTML is ready.
// (If the script is at the bottom of <body>, the HTML already exists, but this
//  guard makes it robust regardless of where the script loads.)
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", init);
} else {
  init();
}

</script>

</body>
</html>
